---
name: CI

"on":
  push:
    branches: [master, feature/*, hotfix/*]
  pull_request:
    branches: [master]
  schedule:
    # Run performance regression tests daily at 2 AM UTC
    - cron: "0 2 * * *"
  workflow_dispatch:
    inputs:
      run_performance_tests:
        description: "Run performance benchmarks"
        required: false
        default: false
        type: boolean
      run_integration_tests:
        description: "Run full integration test suite"
        required: false
        default: true
        type: boolean

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

env:
  PYTHON_VERSION: "3.12"
  HOMEBREW_NO_AUTO_UPDATE: 1
  HOMEBREW_NO_INSTALL_CLEANUP: 1
  PYTEST_TIMEOUT: 300

jobs:
  # ---------------------------------------------------------------------------
  # Pre-flight checks and setup
  # ---------------------------------------------------------------------------
  setup:
    name: Setup and Validation
    runs-on: ubuntu-latest
    outputs:
      python-version: ${{ steps.setup.outputs.python-version }}
      should-run-performance: ${{ steps.conditions.outputs.run-performance }}
      should-run-integration: ${{ steps.conditions.outputs.run-integration }}
    steps:
      - name: Checkout code
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Setup conditions
        id: conditions
        run: |
          if [[ "${{ github.event_name }}" == "schedule" ]] || \
             [[ "${{ github.event.inputs.run_performance_tests }}" == "true" ]]; then
            echo "run-performance=true" >> $GITHUB_OUTPUT
          else
            echo "run-performance=false" >> $GITHUB_OUTPUT
          fi

          if [[ "${{ github.event.inputs.run_integration_tests }}" != "false" ]]; then
            echo "run-integration=true" >> $GITHUB_OUTPUT
          else
            echo "run-integration=false" >> $GITHUB_OUTPUT
          fi

      - name: Setup Python version
        id: setup
        run: |
          echo "python-version=${{ env.PYTHON_VERSION }}" >> $GITHUB_OUTPUT

  # ---------------------------------------------------------------------------
  # Code quality and linting
  # ---------------------------------------------------------------------------
  quality:
    name: Code Quality
    runs-on: ubuntu-latest
    needs: setup
    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: ${{ needs.setup.outputs.python-version }}
          cache: pip

      - name: Install dependencies
        uses: ./.github/actions/setup-python-deps

      - name: Run Ruff linter
        run: ruff check --output-format=github .

      - name: Run Ruff formatter check
        run: ruff format --check .

      - name: Run MyPy type checking
        run: mypy versiontracker --ignore-missing-imports

      - name: Check import sorting (via Ruff)
        run: ruff check --select I --diff .

  # ---------------------------------------------------------------------------
  # Unit tests matrix
  # ---------------------------------------------------------------------------
  test-matrix:
    name: Tests (Python ${{ matrix.python-version }}, ${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    needs: setup
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest]
        python-version: ["3.12", "3.13"]
        include:
          - os: macos-latest
            python-version: "3.12"
            run-homebrew-tests: true
    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v6
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip

      - name: Install dependencies
        uses: ./.github/actions/setup-python-deps

      - name: Install fuzzy matching library
        run: pip install rapidfuzz || true

      - name: Run unit tests
        run: |
          set +e
          if [ "${{ matrix.os }}" = "ubuntu-latest" ]; then
            TIMEOUT=600
          else
            TIMEOUT=300
          fi

          pytest tests/ \
            --cov=versiontracker \
            --cov-branch \
            --cov-report=xml \
            --cov-report=term-missing:skip-covered \
            --junit-xml=junit-${{ matrix.os }}-${{ matrix.python-version }}.xml \
            --timeout=$TIMEOUT \
            --timeout-method=thread \
            --maxfail=5 \
            -v \
            -m "not integration and not slow" 2>&1 | tee pytest_output.log
          EC=$?

          # Handle pytest KeyboardInterrupt (exit code 2)
          if [ "$EC" -eq 2 ]; then
            echo "::warning::Detected pytest exit code 2 (KeyboardInterrupt)"
            if grep -q "passed" pytest_output.log && ! grep -q " FAILED " pytest_output.log; then
              echo "Tests passed despite KeyboardInterrupt exit code"
              EC=0
            fi
          fi
          exit $EC

      - name: Run Homebrew integration tests (macOS only)
        if: matrix.run-homebrew-tests
        run: |
          pytest tests/ \
            -k "homebrew or brew" \
            --timeout=600 \
            -v \
            --tb=short

      - name: Upload test results
        uses: actions/upload-artifact@v7
        if: always()
        with:
          name: test-results-${{ matrix.os }}-${{ matrix.python-version }}
          path: |
            junit-*.xml
            coverage.xml
          retention-days: 14

      - name: Upload coverage to Codecov
        uses: codecov/codecov-action@v5
        if: matrix.os == 'ubuntu-latest' && matrix.python-version == '3.12'
        with:
          file: ./coverage.xml
          flags: unittests
          name: codecov-umbrella
          fail_ci_if_error: false
          token: ${{ secrets.CODECOV_TOKEN }}

  # ---------------------------------------------------------------------------
  # Build package
  # ---------------------------------------------------------------------------
  build:
    name: Build Package
    runs-on: ubuntu-latest
    needs: [test-matrix]
    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.13"

      - name: Install build dependencies
        run: |
          python -m pip install --upgrade pip
          pip install build wheel twine

      - name: Build package
        run: python -m build

      - name: Validate package
        run: twine check dist/*

      - name: Upload artifacts
        uses: actions/upload-artifact@v7
        with:
          name: dist-packages
          path: dist/
          retention-days: 14

  # ---------------------------------------------------------------------------
  # Integration tests
  # ---------------------------------------------------------------------------
  integration-tests:
    name: Integration Tests
    runs-on: macos-latest
    needs: [setup, quality]
    if: needs.setup.outputs.should-run-integration == 'true'
    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: ${{ needs.setup.outputs.python-version }}
          cache: pip

      - name: Install dependencies
        uses: ./.github/actions/setup-python-deps

      - name: Install fuzzy matching library
        run: pip install rapidfuzz || true

      - name: Install test application via Homebrew
        run: brew install --cask firefox || true

      - name: Run end-to-end integration tests
        run: |
          pytest tests/test_end_to_end_integration.py \
            --timeout=900 \
            -v \
            --tb=long \
            --capture=no

      - name: Test CLI commands
        run: |
          python -m versiontracker --version
          python -m versiontracker --help
          python -m versiontracker --apps --debug || true
          python -m versiontracker --recom --debug || true

      - name: Validate plugin system
        run: |
          python -c "
          from versiontracker.plugins import plugin_manager
          from versiontracker.plugins.example_plugins import XMLExportPlugin
          plugin = XMLExportPlugin()
          plugin_manager.register_plugin(plugin)
          print(f'Registered plugins: {plugin_manager.list_plugins()}')
          "

  # ---------------------------------------------------------------------------
  # Performance benchmarks (schedule / manual only)
  # ---------------------------------------------------------------------------
  performance-tests:
    name: Performance Benchmarks
    runs-on: macos-latest
    needs: [setup, quality]
    if: needs.setup.outputs.should-run-performance == 'true'
    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: ${{ needs.setup.outputs.python-version }}
          cache: pip

      - name: Install dependencies
        uses: ./.github/actions/setup-python-deps

      - name: Install fuzzy matching library
        run: pip install rapidfuzz || true

      - name: Run performance benchmarks
        run: |
          python -c "
          from versiontracker.experimental.benchmarks import create_benchmark_suite, VersionTrackerBenchmarks

          suite = create_benchmark_suite()
          vt_benchmarks = VersionTrackerBenchmarks(suite)
          vt_benchmarks.run_all_benchmarks()
          suite.save_results('ci_benchmark_results.json')
          report = suite.generate_report('json')
          with open('benchmark_report.json', 'w') as f:
              f.write(report)
          print('Performance benchmarks completed')
          "

      - name: Check performance regression
        run: |
          python -c "
          from versiontracker.experimental.benchmarks import run_performance_regression_test
          if not run_performance_regression_test():
              print('Performance regression detected!')
              exit(1)
          print('No performance regression detected')
          "

      - name: Upload benchmark results
        uses: actions/upload-artifact@v7
        with:
          name: performance-results
          path: |
            benchmark_report.json
            ci_benchmark_results.json
          retention-days: 30

  # ---------------------------------------------------------------------------
  # Error handling validation
  # ---------------------------------------------------------------------------
  error-handling-tests:
    name: Error Handling Tests
    runs-on: ubuntu-latest
    needs: [setup, quality]
    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: ${{ needs.setup.outputs.python-version }}

      - name: Install dependencies
        uses: ./.github/actions/setup-python-deps

      - name: Test structured error system
        run: |
          python -c "
          from versiontracker.error_codes import ErrorCode, create_error
          from versiontracker.exceptions import HomebrewError

          error = create_error(ErrorCode.HBW001, details='Test Homebrew error')
          print(f'Error: {error.format_user_message()}')

          try:
              raise HomebrewError('Test error', error_code=ErrorCode.HBW001)
          except HomebrewError as e:
              print(f'Caught: {e.get_error_code()}')
              assert e.get_error_code() == 'HBW001'

          print('Structured error system working correctly')
          "

      - name: Test error code completeness
        run: |
          python -c "
          from versiontracker.error_codes import ErrorCode, ErrorCategory, ErrorSeverity

          for category in ErrorCategory:
              codes = [c for c in ErrorCode if c.category == category]
              assert len(codes) > 0, f'No error codes for category {category}'
              print(f'{category.value}: {len(codes)} codes')

          for severity in ErrorSeverity:
              codes = [c for c in ErrorCode if c.severity == severity]
              print(f'{severity.value}: {len(codes)} codes')

          print('Error code system validation passed')
          "

  # ---------------------------------------------------------------------------
  # Documentation and examples
  # ---------------------------------------------------------------------------
  docs-and-examples:
    name: Documentation & Examples
    runs-on: ubuntu-latest
    needs: setup
    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: ${{ needs.setup.outputs.python-version }}

      - name: Install dependencies
        uses: ./.github/actions/setup-python-deps

      - name: Validate API documentation
        run: |
          python -c "
          import inspect
          from versiontracker import homebrew, apps, version, config

          for module in [homebrew, apps, version, config]:
              for name, obj in inspect.getmembers(module):
                  if inspect.isfunction(obj) and not name.startswith('_'):
                      if not obj.__doc__:
                          print(f'Warning: {module.__name__}.{name} missing docstring')
          print('API documentation validation completed')
          "

      - name: Test example code in documentation
        run: |
          python -c "
          from versiontracker.config import get_config
          config = get_config()
          print(f'Config loaded: {type(config)}')
          original_rate_limit = getattr(config, 'api_rate_limit', 60)
          config.api_rate_limit = 120
          assert config.api_rate_limit == 120
          config.api_rate_limit = original_rate_limit
          print('Documentation examples working correctly')
          "

  # ---------------------------------------------------------------------------
  # Plugin system tests
  # ---------------------------------------------------------------------------
  plugin-system-tests:
    name: Plugin System Tests
    runs-on: ubuntu-latest
    needs: [setup, quality]
    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: ${{ needs.setup.outputs.python-version }}

      - name: Install dependencies
        uses: ./.github/actions/setup-python-deps

      - name: Test plugin registration and execution
        run: |
          python -c "
          from versiontracker.plugins import plugin_manager
          from versiontracker.plugins.example_plugins import (
              XMLExportPlugin, YAMLExportPlugin, AdvancedMatchingPlugin
          )

          xml_plugin = XMLExportPlugin()
          yaml_plugin = YAMLExportPlugin()
          matching_plugin = AdvancedMatchingPlugin()

          plugin_manager.register_plugin(xml_plugin)
          plugin_manager.register_plugin(yaml_plugin)
          plugin_manager.register_plugin(matching_plugin)

          plugins = plugin_manager.list_plugins()
          assert 'xml_export' in plugins
          assert 'yaml_export' in plugins
          assert 'advanced_matching' in plugins

          test_data = [{'name': 'test', 'version': '1.0.0'}]
          assert '<versiontracker_data' in xml_plugin.export_data(test_data)
          assert 'metadata:' in yaml_plugin.export_data(test_data)

          print('Plugin system tests passed')
          "

      - name: Test plugin loading from files
        run: |
          mkdir -p test_plugins
          cat > test_plugins/test_plugin.py << 'PYEOF'
          from versiontracker.plugins import BasePlugin

          class TestFilePlugin(BasePlugin):
              name = "test_file_plugin"
              version = "1.0.0"
              description = "Test plugin loaded from file"

              def initialize(self):
                  pass

              def cleanup(self):
                  pass
          PYEOF

          python -c "
          from versiontracker.plugins import plugin_manager
          from pathlib import Path

          plugin_manager.load_plugin_from_file(Path('test_plugins/test_plugin.py'))
          assert 'test_file_plugin' in plugin_manager.list_plugins()
          plugin_manager.cleanup_all()
          print('Plugin file loading tests passed')
          "

  # ---------------------------------------------------------------------------
  # Final validation and reporting
  # ---------------------------------------------------------------------------
  final-validation:
    name: Final Validation
    runs-on: ubuntu-latest
    needs:
      [test-matrix, build, integration-tests, quality, error-handling-tests]
    if: always()
    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Download all artifacts
        uses: actions/download-artifact@v8
        continue-on-error: true

      - name: Consolidate test results
        run: |
          echo "## CI Pipeline Results" > pipeline_summary.md
          echo "" >> pipeline_summary.md
          echo "### Job Status Summary" >> pipeline_summary.md
          echo "- Quality Checks: ${{ needs.quality.result }}" >> pipeline_summary.md
          echo "- Unit Tests: ${{ needs.test-matrix.result }}" >> pipeline_summary.md
          echo "- Build: ${{ needs.build.result }}" >> pipeline_summary.md
          echo "- Integration Tests: ${{ needs.integration-tests.result }}" >> pipeline_summary.md
          echo "- Error Handling: ${{ needs.error-handling-tests.result }}" >> pipeline_summary.md
          echo "" >> pipeline_summary.md
          cat pipeline_summary.md

      - name: Check critical failures
        run: |
          FAILED=0

          for JOB in quality test-matrix build; do
            case "$JOB" in
              quality)     RESULT="${{ needs.quality.result }}" ;;
              test-matrix) RESULT="${{ needs.test-matrix.result }}" ;;
              build)       RESULT="${{ needs.build.result }}" ;;
            esac
            if [[ "$RESULT" != "success" ]]; then
              echo "::error::$JOB: $RESULT"
              FAILED=1
            else
              echo "$JOB: $RESULT"
            fi
          done

          # Integration tests may be skipped (conditional job) — only fail on failure
          INT_RESULT="${{ needs.integration-tests.result }}"
          if [[ "$INT_RESULT" == "failure" ]]; then
            echo "::error::integration-tests: $INT_RESULT"
            FAILED=1
          else
            echo "integration-tests: $INT_RESULT"
          fi

          # Error handling tests are advisory
          echo "error-handling-tests: ${{ needs.error-handling-tests.result }}"

          if [[ "$FAILED" -eq 1 ]]; then
            echo "::error::One or more critical checks failed"
            exit 1
          fi
          echo "All critical checks passed"

      - name: Upload consolidated results
        uses: actions/upload-artifact@v7
        with:
          name: ci-pipeline-results
          path: pipeline_summary.md
          retention-days: 14
